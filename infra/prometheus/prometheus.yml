# Prometheus config for Canton MVP
# Scrapes API metrics when /metrics endpoint is exposed

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "canton-mvp-api"
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
